<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>⚡ TEMPLATE RUN - Mobile Edition ⚡ | Endless Runner</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #03050b);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', 'Orbitron', 'Courier New', monospace;
            touch-action: manipulation;
            padding: 12px;
            position: fixed;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            max-width: 100%;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5), 0 0 0 3px #f7d44a, 0 0 0 6px #2c1a0e;
            cursor: pointer;
            background: #142830;
            width: 100%;
            height: auto;
            max-width: 900px;
            touch-action: none;
        }

        .dashboard {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 12px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(16px);
            border-radius: 60px;
            padding: 8px 20px;
            border: 1px solid #ffcf7a;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }

        .stat {
            background: rgba(1, 15, 19, 0.9);
            padding: 4px 16px;
            border-radius: 40px;
            text-align: center;
            min-width: 85px;
        }

        .stat-label {
            font-size: 0.65rem;
            letter-spacing: 1.5px;
            color: #ffcd94;
            text-transform: uppercase;
            font-weight: bold;
        }

        .stat-value {
            font-size: 1.6rem;
            font-weight: 800;
            color: #fffbee;
            font-family: 'Orbitron', monospace;
            line-height: 1;
            text-shadow: 0 0 3px #ffb347;
        }

        .powerup-indicator {
            background: rgba(42, 36, 24, 0.9);
            padding: 4px 16px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            font-weight: bold;
            color: #ffdfa5;
            white-space: nowrap;
        }

        .controls {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 5px;
            width: 100%;
            max-width: 500px;
        }

        button {
            background: linear-gradient(145deg, #2b5f6b, #1e434c);
            border: none;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 12px 28px;
            border-radius: 60px;
            font-family: inherit;
            color: #fff0cc;
            box-shadow: 0 6px 0 #0e2a2f;
            cursor: pointer;
            transition: 0.05s linear;
            touch-action: manipulation;
            flex: 1;
            min-width: 120px;
            -webkit-tap-highlight-color: transparent;
        }

        button:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #0e2a2f;
        }

        .restart-btn {
            background: linear-gradient(145deg, #c9512c, #9b3412);
            box-shadow: 0 6px 0 #551d06;
        }

        .status-badge {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
            padding: 5px 18px;
            border-radius: 40px;
            font-weight: bold;
            font-family: monospace;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .touch-zone {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            height: 120px;
            background: transparent;
            pointer-events: none;
            z-index: 10;
        }

        @media (max-width: 768px) {
            .stat-value { font-size: 1.2rem; }
            .stat { padding: 3px 10px; min-width: 65px; }
            .stat-label { font-size: 0.55rem; }
            button { padding: 10px 20px; font-size: 1rem; min-width: 100px; }
            .dashboard { gap: 8px; padding: 6px 15px; }
            .powerup-indicator { font-size: 0.7rem; padding: 3px 12px; }
            .status-badge { font-size: 0.75rem; padding: 4px 14px; }
        }

        @media (max-width: 480px) {
            .stat-value { font-size: 1rem; }
            .stat { min-width: 55px; padding: 2px 8px; }
            button { padding: 8px 16px; font-size: 0.9rem; min-width: 85px; }
            .powerup-indicator { font-size: 0.6rem; }
        }

        @media (orientation: landscape) and (max-height: 500px) {
            .dashboard { padding: 4px 12px; gap: 6px; }
            .stat { min-width: 60px; }
            .stat-value { font-size: 1rem; }
            button { padding: 6px 14px; font-size: 0.85rem; }
            .game-wrapper { gap: 5px; }
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <canvas id="gameCanvas" width="900" height="550"></canvas>

    <div class="dashboard">
        <div class="stat">
            <div class="stat-label">🏆 SCORE</div>
            <div class="stat-value" id="scoreDisplay">0</div>
        </div>
        <div class="stat">
            <div class="stat-label">⭐ BEST</div>
            <div class="stat-value" id="bestDisplay">0</div>
        </div>
        <div class="stat">
            <div class="stat-label">💀 DISTANCE</div>
            <div class="stat-value" id="distanceDisplay">0</div>
        </div>
        <div class="powerup-indicator" id="powerupStatus">
            🛡️ NO SHIELD
        </div>
        <div class="status-badge" id="gameStatusText">▶ RUN</div>
    </div>

    <div class="controls">
        <button id="jumpBtn">🦘 JUMP</button>
        <button id="restartBtn" class="restart-btn">🌀 RESTART</button>
    </div>
    <div class="controls">
        <small style="color:#bbccdd; text-align: center;">▼ TAP anywhere or press SPACE to jump • Collect golden shields ▼</small>
    </div>
</div>

<script>
    (function(){
        // ---------- MOBILE OPTIMIZED CONFIGURATION ----------
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Handle responsive canvas scaling
        function resizeCanvas() {
            const maxWidth = Math.min(window.innerWidth - 24, 900);
            const scale = maxWidth / 900;
            canvas.style.width = `${maxWidth}px`;
            canvas.style.height = `${550 * scale}px`;
        }
        
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        
        const W = 900, H = 550;
        const GROUND_Y = H - 68;
        const PLAYER_WIDTH = 34;
        const PLAYER_HEIGHT = 44;
        const PLAYER_X = 120;
        
        // ---------- GLOBAL STATES ----------
        let gameRunning = true;
        let score = 0;
        let distance = 0;
        let bestScore = 0;
        let frame = 0;
        let baseSpeed = 5.2;
        let currentSpeed = 5.2;
        
        // Power-up system
        let hasShield = false;
        let shieldFramesLeft = 0;
        let invincibilityFlash = 0;
        let screenShake = 0;
        
        // Player physics
        let playerY = GROUND_Y - PLAYER_HEIGHT;
        let yVelocity = 0;
        let isOnGround = true;
        let coyoteTimer = 0;
        let jumpBufferTimer = 0;
        const GRAVITY = 0.85;
        const JUMP_POWER = -11.8;
        const COYOTE_TIME = 6;
        const JUMP_BUFFER = 8;
        
        // Game objects
        let obstacles = [];
        let powerups = [];
        let particles = [];
        
        let spawnCounter = 0;
        let powerupSpawnCounter = 0;
        
        // Touch/mobile variables
        let lastTouchTime = 0;
        let touchJumpCooldown = false;
        
        // Load best
        try {
            const savedBest = localStorage.getItem('templateRunAdvBest');
            if(savedBest && !isNaN(parseInt(savedBest))) bestScore = parseInt(savedBest);
        } catch(e) {}
        
        // DOM elements
        const scoreDisplaySpan = document.getElementById('scoreDisplay');
        const bestDisplaySpan = document.getElementById('bestDisplay');
        const distanceDisplaySpan = document.getElementById('distanceDisplay');
        const powerupStatusSpan = document.getElementById('powerupStatus');
        const gameStatusText = document.getElementById('gameStatusText');
        
        function updateUI() {
            scoreDisplaySpan.innerText = Math.floor(score);
            bestDisplaySpan.innerText = bestScore;
            distanceDisplaySpan.innerText = Math.floor(distance);
            if(hasShield && shieldFramesLeft > 0) {
                powerupStatusSpan.innerHTML = `🛡️ SHIELD ${Math.ceil(shieldFramesLeft/60)}s`;
                powerupStatusSpan.style.color = "#ffdd99";
            } else {
                powerupStatusSpan.innerHTML = `⚡ NO SHIELD`;
                powerupStatusSpan.style.color = "#ffb370";
            }
            gameStatusText.innerText = gameRunning ? "🏃‍♂️ RUN" : "💀 GAME OVER";
        }
        
        function updateBest() {
            let intScore = Math.floor(score);
            if(intScore > bestScore) {
                bestScore = intScore;
                localStorage.setItem('templateRunAdvBest', bestScore);
                updateUI();
            }
        }
        
        function restartGame() {
            gameRunning = true;
            score = 0;
            distance = 0;
            currentSpeed = baseSpeed;
            obstacles = [];
            powerups = [];
            particles = [];
            hasShield = false;
            shieldFramesLeft = 0;
            invincibilityFlash = 0;
            screenShake = 0;
            playerY = GROUND_Y - PLAYER_HEIGHT;
            yVelocity = 0;
            isOnGround = true;
            coyoteTimer = 0;
            jumpBufferTimer = 0;
            frame = 0;
            spawnCounter = 6;
            powerupSpawnCounter = 45;
            updateUI();
            updateBest();
        }
        
        function spawnObstacle() {
            const obsHeight = 32 + Math.floor(Math.random() * 17);
            const obsY = GROUND_Y - obsHeight;
            let variant = Math.random() > 0.7 ? "spike" : "block";
            obstacles.push({
                x: W,
                y: obsY,
                w: 28,
                h: obsHeight,
                variant: variant,
                counted: false,
                colorVibe: 30 + Math.floor(Math.random() * 50)
            });
        }
        
        function spawnPowerup() {
            powerups.push({
                x: W,
                y: GROUND_Y - 28,
                w: 22,
                h: 22,
                type: "shield",
                collected: false
            });
        }
        
        function rectCollide(r1, r2) {
            return !(r2.x > r1.x + r1.w ||
                r2.x + r2.w < r1.x ||
                r2.y > r1.y + r1.h ||
                r2.y + r2.h < r1.y);
        }
        
        function addImpactParticles(x, y, colorType) {
            for(let i=0;i<8;i++) {
                particles.push({
                    x: x + (Math.random() - 0.5)*15,
                    y: y + (Math.random() - 0.5)*12,
                    vx: (Math.random() - 0.5)*4,
                    vy: (Math.random() - 0.5)*4 - 2,
                    life: 14 + Math.random()*8,
                    size: 3+Math.random()*5,
                    color: colorType === "shield" ? "#ffd966" : "#d9534f"
                });
            }
        }
        
        function updateGame() {
            if(!gameRunning) return;
            
            let targetSpeed = baseSpeed + Math.floor(distance / 850);
            if(targetSpeed > 12.8) targetSpeed = 12.8;
            currentSpeed = currentSpeed * 0.97 + targetSpeed * 0.03;
            if(currentSpeed < 4.5) currentSpeed = 4.5;
            
            distance += currentSpeed * 0.25;
            if(frame % 15 === 0) updateUI();
            
            yVelocity += GRAVITY;
            playerY += yVelocity;
            const floorLimit = GROUND_Y - PLAYER_HEIGHT;
            if(playerY >= floorLimit) {
                playerY = floorLimit;
                yVelocity = 0;
                isOnGround = true;
                coyoteTimer = COYOTE_TIME;
            } else {
                if(isOnGround) isOnGround = false;
                if(coyoteTimer > 0) coyoteTimer--;
            }
            if(playerY < 0) {
                playerY = 0;
                if(yVelocity < 0) yVelocity = 0;
            }
            
            if(jumpBufferTimer > 0) jumpBufferTimer--;
            if(jumpBufferTimer > 0 && (isOnGround || coyoteTimer > 0)) {
                yVelocity = JUMP_POWER;
                isOnGround = false;
                coyoteTimer = 0;
                jumpBufferTimer = 0;
                addImpactParticles(PLAYER_X+16, GROUND_Y-8, "jump");
                // Haptic feedback for mobile (if supported)
                if(window.navigator && window.navigator.vibrate) {
                    window.navigator.vibrate(20);
                }
            }
            
            if(spawnCounter <= 0) {
                let delay = Math.max(32, 58 - Math.floor(currentSpeed * 1.5));
                spawnCounter = Math.floor(delay);
                spawnObstacle();
            } else spawnCounter--;
            
            if(powerupSpawnCounter <= 0 && gameRunning) {
                powerupSpawnCounter = 180 + Math.floor(Math.random() * 150);
                spawnPowerup();
            } else powerupSpawnCounter--;
            
            for(let i=0; i<obstacles.length; i++) {
                const obs = obstacles[i];
                obs.x -= currentSpeed;
                if(!obs.counted && obs.x + obs.w < PLAYER_X) {
                    obs.counted = true;
                    score += 12;
                    updateUI();
                    updateBest();
                    for(let p=0;p<4;p++) particles.push({
                        x: obs.x+obs.w/2, y: obs.y-5, vx: (Math.random()-0.5)*2, vy: -2, life: 12, size: 3, color: "#ffe28a"
                    });
                }
            }
            obstacles = obstacles.filter(obs => obs.x + obs.w > -30);
            
            for(let i=0;i<powerups.length;i++) {
                const pUp = powerups[i];
                pUp.x -= currentSpeed;
                const powerRect = { x: pUp.x, y: pUp.y, w: pUp.w, h: pUp.h };
                const playerRect = { x: PLAYER_X, y: playerY, w: PLAYER_WIDTH, h: PLAYER_HEIGHT };
                if(!pUp.collected && rectCollide(playerRect, powerRect)) {
                    pUp.collected = true;
                    hasShield = true;
                    shieldFramesLeft = 450;
                    addImpactParticles(pUp.x+10, pUp.y+10, "shield");
                    updateUI();
                    if(window.navigator && window.navigator.vibrate) {
                        window.navigator.vibrate(50);
                    }
                }
            }
            powerups = powerups.filter(p => p.x + p.w > 0 && !p.collected);
            
            if(hasShield && shieldFramesLeft > 0) {
                shieldFramesLeft--;
                if(shieldFramesLeft <= 0) {
                    hasShield = false;
                    updateUI();
                }
            } else if(shieldFramesLeft <= 0) hasShield = false;
            
            const playerCollisionRect = { x: PLAYER_X, y: playerY, w: PLAYER_WIDTH, h: PLAYER_HEIGHT };
            for(let i=0;i<obstacles.length;i++) {
                const obs = obstacles[i];
                const obsRect = { x: obs.x, y: obs.y, w: obs.w, h: obs.h };
                if(rectCollide(playerCollisionRect, obsRect)) {
                    if(hasShield && shieldFramesLeft > 0) {
                        obstacles.splice(i,1);
                        hasShield = false;
                        shieldFramesLeft = 0;
                        screenShake = 8;
                        invincibilityFlash = 12;
                        addImpactParticles(PLAYER_X+16, playerY+20, "shield");
                        updateUI();
                        if(window.navigator && window.navigator.vibrate) {
                            window.navigator.vibrate(100);
                        }
                        break;
                    } else {
                        gameRunning = false;
                        screenShake = 12;
                        updateUI();
                        updateBest();
                        addImpactParticles(PLAYER_X+16, playerY+20, "death");
                        if(window.navigator && window.navigator.vibrate) {
                            window.navigator.vibrate(200);
                        }
                        break;
                    }
                }
            }
            
            for(let i=0;i<particles.length;i++) {
                particles[i].x += particles[i].vx;
                particles[i].y += particles[i].vy;
                particles[i].life--;
                if(particles[i].life <= 0 || particles[i].y > H+50) {
                    particles.splice(i,1); i--;
                }
            }
            
            if(screenShake > 0) screenShake--;
            if(invincibilityFlash > 0) invincibilityFlash--;
            frame++;
        }
        
        // ------------------- RENDERING (optimized for mobile) ------------------
        function draw() {
            ctx.save();
            if(screenShake > 0) {
                ctx.translate((Math.random() - 0.5)*5, (Math.random() - 0.5)*4);
            }
            
            const gradSky = ctx.createLinearGradient(0, 0, 0, H);
            gradSky.addColorStop(0, "#0f1c2b");
            gradSky.addColorStop(0.65, "#253b46");
            ctx.fillStyle = gradSky;
            ctx.fillRect(0, 0, W, H);
            
            for(let i=0;i<80;i++) {
                ctx.fillStyle = `rgba(255,235,170,${0.3+Math.sin(frame*0.02+i)*0.1})`;
                ctx.beginPath();
                ctx.arc( (i*131)%W, (i*57)%(H*0.5), 1.2, 0, Math.PI*2);
                ctx.fill();
            }
            
            ctx.fillStyle = "#f9e0a0";
            ctx.shadowBlur = 20;
            ctx.beginPath();
            ctx.arc(W-80, 70, 35, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "#f5cb7e";
            ctx.beginPath();
            ctx.arc(W-70, 60, 6, 0, Math.PI*2);
            ctx.fill();
            
            ctx.fillStyle = "#4f3a28";
            ctx.fillRect(0, GROUND_Y-5, W, 8);
            ctx.fillStyle = "#836e4a";
            ctx.fillRect(0, GROUND_Y-2, W, 5);
            ctx.fillStyle = "#2c2418";
            ctx.fillRect(0, GROUND_Y, W, H-GROUND_Y+5);
            ctx.fillStyle = "#e6bc7e";
            for(let i=0;i<20;i++) {
                let lineX = (frame * 2.8 + i * 62) % (W+80) - 40;
                ctx.fillRect(lineX, GROUND_Y-4, 22, 4);
            }
            ctx.fillStyle = "#ab8a54";
            for(let i=0;i<12;i++) {
                let markX = (frame*1.2 + i*103) % (W+150)-50;
                ctx.fillRect(markX, GROUND_Y+3, 12, 4);
            }
            
            for(let p of powerups) {
                ctx.shadowBlur = 12;
                ctx.fillStyle = "#FFD966";
                ctx.beginPath();
                ctx.ellipse(p.x+11, p.y+11, 12, 12, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = "#F4A261";
                ctx.beginPath();
                ctx.ellipse(p.x+11, p.y+11, 8, 8, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = "#FFE484";
                ctx.beginPath();
                ctx.ellipse(p.x+11, p.y+11, 4, 4, 0, 0, Math.PI*2);
                ctx.fill();
            }
            
            for(let obs of obstacles) {
                const grad = ctx.createLinearGradient(obs.x, obs.y, obs.x+obs.w, obs.y+obs.h);
                grad.addColorStop(0, "#8b3c2c");
                grad.addColorStop(1, "#bd5a3e");
                ctx.fillStyle = grad;
                ctx.shadowBlur = 6;
                ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
                ctx.fillStyle = "#2c1710";
                ctx.fillRect(obs.x+4, obs.y+obs.h-12, obs.w-8, 6);
                if(obs.variant === "spike") {
                    ctx.fillStyle = "#c9794b";
                    for(let s=0;s<3;s++) {
                        ctx.beginPath();
                        ctx.moveTo(obs.x+5+s*8, obs.y-6);
                        ctx.lineTo(obs.x+2+s*8, obs.y+2);
                        ctx.lineTo(obs.x+8+s*8, obs.y+2);
                        ctx.fill();
                    }
                } else {
                    ctx.fillStyle = "#f0bc7a";
                    ctx.fillRect(obs.x+6, obs.y+8, 6, 8);
                    ctx.fillRect(obs.x+16, obs.y+8, 6, 8);
                }
            }
            
            let drawPlayer = true;
            if(invincibilityFlash > 0 && (Math.floor(Date.now()/50)%3 === 0)) drawPlayer = false;
            if(drawPlayer) {
                ctx.shadowBlur = 8;
                const pY = playerY;
                ctx.fillStyle = "#40a3a0";
                ctx.beginPath();
                ctx.roundRect(PLAYER_X+4, pY+10, PLAYER_WIDTH-8, PLAYER_HEIGHT-12, 10);
                ctx.fill();
                ctx.fillStyle = "#276b68";
                ctx.fillRect(PLAYER_X+8, pY+22, 6, 12);
                ctx.fillRect(PLAYER_X+20, pY+22, 6, 12);
                ctx.fillStyle = "#fbd5a2";
                ctx.beginPath();
                ctx.ellipse(PLAYER_X+17, pY+12, 14, 16, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = "#161c1e";
                ctx.beginPath();
                ctx.arc(PLAYER_X+11, pY+10, 2.8, 0, Math.PI*2);
                ctx.arc(PLAYER_X+23, pY+10, 2.8, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = "#f5f0dd";
                ctx.beginPath();
                ctx.arc(PLAYER_X+10, pY+9, 1.2, 0, Math.PI*2);
                ctx.arc(PLAYER_X+22, pY+9, 1.2, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = "#ea6a47";
                ctx.fillRect(PLAYER_X-8, pY+14, 9, 14);
                if(hasShield && shieldFramesLeft > 0) {
                    ctx.globalAlpha = 0.6 + Math.sin(Date.now() * 0.015)*0.2;
                    ctx.beginPath();
                    ctx.arc(PLAYER_X+17, pY+22, 22, 0, Math.PI*2);
                    ctx.fillStyle = "#ffc857";
                    ctx.fill();
                    ctx.globalAlpha = 1;
                }
            }
            
            for(let p of particles) {
                ctx.globalAlpha = Math.min(1, p.life/12);
                ctx.fillStyle = p.color || "#ffb347";
                ctx.beginPath();
                ctx.rect(p.x, p.y, p.size*0.8, p.size*0.8);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
            
            if(!gameRunning) {
                ctx.fillStyle = "#000000bb";
                ctx.fillRect(0, 0, W, H);
                ctx.font = 'bold 42px "Orbitron", monospace';
                ctx.fillStyle = "#ffcf7e";
                ctx.shadowBlur = 0;
                ctx.textAlign = "center";
                ctx.fillText("⚡ GAME OVER ⚡", W/2, H/2-45);
                ctx.font = '24px monospace';
                ctx.fillStyle = "#ffbc6e";
                ctx.fillText(`SCORE: ${Math.floor(score)}  |  BEST: ${bestScore}`, W/2, H/2+25);
                ctx.font = '18px monospace';
                ctx.fillStyle = "#e7c288";
                ctx.fillText("tap RESTART or press R", W/2, H/2+95);
                ctx.textAlign = "left";
            }
            
            ctx.font = "bold 14px monospace";
            ctx.fillStyle = "#f7e2b0";
            ctx.fillText(`⚡ ${currentSpeed.toFixed(1)}`, W-75, 40);
            ctx.restore();
        }
        
        if(!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (w < 2 * r) r = w / 2;
                if (h < 2 * r) r = h / 2;
                this.moveTo(x+r, y);
                this.lineTo(x+w-r, y);
                this.quadraticCurveTo(x+w, y, x+w, y+r);
                this.lineTo(x+w, y+h-r);
                this.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
                this.lineTo(x+r, y+h);
                this.quadraticCurveTo(x, y+h, x, y+h-r);
                this.lineTo(x, y+r);
                this.quadraticCurveTo(x, y, x+r, y);
                return this;
            };
        }
        
        function performJump() {
            if(!gameRunning) return;
            jumpBufferTimer = JUMP_BUFFER;
            if(isOnGround || coyoteTimer > 0) {
                yVelocity = JUMP_POWER;
                isOnGround = false;
                coyoteTimer = 0;
                jumpBufferTimer = 0;
                addImpactParticles(PLAYER_X+16, GROUND_Y-6, "jump");
                if(window.navigator && window.navigator.vibrate) {
                    window.navigator.vibrate(20);
                }
            }
        }
        
        // Event listeners (mobile + desktop)
        function handleKey(e) {
            const key = e.key;
            if(key === 'ArrowUp' || key === ' ' || key === 'Space') {
                e.preventDefault();
                performJump();
            }
            if(key === 'r' || key === 'R') {
                e.preventDefault();
                restartGame();
            }
        }
        
        document.getElementById('jumpBtn').addEventListener('click', (e) => {
            e.preventDefault();
            performJump();
        });
        
        document.getElementById('restartBtn').addEventListener('click', (e) => {
            e.preventDefault();
            restartGame();
        });
        
        // Touch anywhere on canvas to jump (mobile friendly)
        canvas.addEventListener('click', (e) => {
            e.preventDefault();
            performJump();
        });
        
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            performJump();
        });
        
        // Also add a global touch on body for better mobile response
        document.body.addEventListener('touchstart', (e) => {
            // Only trigger if not touching a button
            if(e.target.tagName !== 'BUTTON' && e.target.id !== 'jumpBtn' && e.target.id !== 'restartBtn') {
                e.preventDefault();
                performJump();
            }
        });
        
        window.addEventListener('keydown', handleKey);
        canvas.addEventListener('contextmenu', (e) => e.preventDefault());
        
        function gameLoop() {
            updateGame();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        restartGame();
        updateUI();
        gameLoop();
    })();
</script>
</body>
</html>
